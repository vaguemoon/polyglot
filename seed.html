    async function seedNouns(lang) {
      logEl.innerHTML = '';
      const data    = NOUN_DATA[lang];
      const label   = lang === 'ko' ? '韓語' : '越南語';
      log(`開始匯入 ${label} 名詞課程…`);
      try {
        const levels = await DB.getLevels(lang);
        let levelId  = levels.find(l => l.name === '初級')?.id;
        if (levelId) {
          log(`✓ 使用現有級別「初級」`, 'log-ok');
        } else {
          levelId = await DB.addLevel(lang, '初級');
          log(`✓ 已建立級別「初級」`, 'log-ok');
        }
        let totalWords = 0;
        for (const lesson of data.lessons) {
          const lessonId = await DB.addLesson(lang, levelId, lesson.name);
          log(`  ✓ 課程「${lesson.name}」`, 'log-ok');
          for (const w of lesson.words) {
            await DB.addWord(lang, levelId, lessonId, w);
            totalWords++;
          }
        }
        log(`\n完成！共匯入 ${data.lessons.length} 課 × ${totalWords} 個詞彙`, 'log-ok');
        log(`→ 前往 app.html?lang=${lang} 開始學習`);
      } catch (e) {
        log(`✗ 匯入失敗：${e.message}`, 'log-err');
      }
    }

    const logEl = document.getElementById('log');
    function log(msg, type = '') {
      const span = document.createElement('span');
      span.className = type;
      span.textContent = msg + '\n';
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function seed(lang) {
      logEl.innerHTML = '';
      const data = SEED_DATA[lang];
      log(`開始匯入 ${lang === 'ko' ? '韓語' : '越南語'}…`);
      try {
        const levelId = await DB.addLevel(lang, data.levelName);
        log(`✓ 級別「${data.levelName}」已建立`, 'log-ok');

        for (const lesson of data.lessons) {
          const lessonId = await DB.addLesson(lang, levelId, lesson.name);
          log(`  ✓ 課程「${lesson.name}」已建立`, 'log-ok');

          for (const w of lesson.words) {
            await DB.addWord(lang, levelId, lessonId, w);
            log(`    ✓ ${w.word} — ${w.zh}`, 'log-ok');
          }
        }
        log(`\n完成！共匯入 ${data.lessons.reduce((s,l)=>s+l.words.length,0)} 個詞彙`, 'log-ok');
        log(`→ 前往 app.html?lang=${lang} 開始學習`);
      } catch (e) {
        log(`✗ 匯入失敗：${e.message}`, 'log-err');
      }
    }
