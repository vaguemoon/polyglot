<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyglot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Mode selector ──────────────────────────────── */
    .mode-card {
      display: flex; align-items: center; gap: 18px;
      background: var(--surface);
      border: 1.5px solid transparent;
      border-radius: var(--radius);
      padding: 20px 22px;
      cursor: pointer; text-align: left;
      font-family: inherit; width: 100%;
      box-shadow: var(--shadow);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
    }
    .mode-card:hover  { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .mode-card:active { transform: scale(0.98); }
    .mode-card:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none; }
    .mode-icon { font-size: 2rem; flex-shrink: 0; width: 40px; text-align: center; }
    .mode-name { font-size: 1rem; font-weight: 700; }
    .mode-desc { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }

    /* ── Study / progress header ────────────────────── */
    .study-hdr {
      padding: 12px 20px 0;
      max-width: 720px; margin: 0 auto; width: 100%;
    }
    .study-hdr-meta {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: var(--muted); margin-bottom: 7px;
    }

    /* ── Flashcard ──────────────────────────────────── */
    .flashcard {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 48px 32px;
      text-align: center; cursor: pointer; user-select: none;
      min-height: 280px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    }
    .fc-hint    { font-size: 0.82rem; color: var(--muted); }
    .fc-zh      { font-size: 2rem; font-weight: 700; line-height: 1.2; }
    .fc-word    { font-size: 2.6rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
    .fc-phonetic { font-size: 1rem; color: var(--muted); }
    .fc-notes   { font-size: 0.84rem; color: var(--muted); font-style: italic; }
    .tts-round {
      background: var(--primary-lt); color: var(--primary);
      border: none; border-radius: 50%; width: 44px; height: 44px;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .tts-round:hover  { background: var(--primary); color: #fff; }
    .tts-round:active { transform: scale(0.88); }
    .fc-image {
      max-width: 100%; max-height: 160px;
      border-radius: 10px; object-fit: contain;
      margin-top: 4px;
    }
    .answer-row { display: flex; gap: 16px; margin-top: 20px; }
    .answer-row .btn { flex: 1; padding: 16px; font-size: 1rem; border-radius: var(--radius); }
    .btn-wrong   { background: #fee2e2; color: #dc2626; }
    .btn-wrong:hover  { background: #fecaca; }
    .btn-correct { background: #dcfce7; color: #15803d; }
    .btn-correct:hover { background: #bbf7d0; }

    /* ── MCQ (listening + quiz) ─────────────────────── */
    .mcq-prompt {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    .mcq-zh-text { font-size: 2rem; font-weight: 700; line-height: 1.2; }
    .mcq-hint    { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }
    .tts-big-btn {
      background: var(--primary-lt); color: var(--primary);
      border: none; border-radius: 50%;
      width: 72px; height: 72px; font-size: 2rem;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.12s;
      box-shadow: var(--shadow);
    }
    .tts-big-btn:hover  { background: var(--primary); color: #fff; }
    .tts-big-btn:active { transform: scale(0.9); }
    .mcq-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mcq-choice {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      font-size: 1.1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      line-height: 1.3;
    }
    .mcq-choice:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-lt); }
    .mcq-choice:active:not(:disabled) { transform: scale(0.97); }
    .mcq-choice.correct { border-color: var(--green); background: #dcfce7; color: #15803d; }
    .mcq-choice.wrong   { border-color: var(--red);   background: #fee2e2; color: #dc2626; }
    .mcq-choice:disabled { cursor: default; }

    /* ── Spelling ───────────────────────────────────── */
    .spell-prompt { text-align: center; margin-bottom: 24px; }
    .spell-zh     { font-size: 2rem; font-weight: 700; }
    .spell-sub    { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }
    .spell-answer-bar {
      min-height: 52px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      margin-bottom: 14px;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      font-size: 1.4rem; font-weight: 700; color: var(--primary);
      cursor: pointer; transition: border-color 0.15s;
    }
    .spell-answer-bar:has(.spell-tile) { border-color: var(--primary); }
    .spell-tiles {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 14px;
    }
    .spell-tile {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 1.3rem; font-weight: 700; cursor: pointer;
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      user-select: none;
    }
    .spell-tile:hover  { border-color: var(--primary); background: var(--primary-lt); }
    .spell-tile:active { transform: scale(0.93); }
    .spell-tile.selected { opacity: 0.3; cursor: default; pointer-events: none; }
    .spell-input { font-size: 1.4rem; font-weight: 600; text-align: center; height: 60px; margin-bottom: 14px; }
    .spell-feedback {
      padding: 14px; border-radius: var(--radius-sm); text-align: center;
      font-size: 0.95rem; font-weight: 600; margin-top: 12px;
    }
    .spell-feedback.ok  { background: #dcfce7; color: #15803d; }
    .spell-feedback.bad { background: #fee2e2; color: #dc2626; }

    /* ── Results ────────────────────────────────────── */
    .results-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin: 20px 0;
    }
    .results-stat { background: var(--surface); border-radius: var(--radius-sm); padding: 20px; text-align: center; }
    .results-stat .big { font-size: 2.6rem; font-weight: 800; line-height: 1; }
    .results-stat .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
    .results-stat.ok  .big { color: var(--green); }
    .results-stat.bad .big { color: var(--red); }

    .loading-msg { color: var(--muted); padding: 28px; text-align: center; font-size: 0.9rem; }
    .error-msg   { color: var(--red);   padding: 20px; text-align: center; font-size: 0.88rem; }

    /* ── Modes page sections ──────────────────────── */
    .modes-section-hdr {
      display: flex; align-items: center; gap: 10px;
      margin: 18px 0 10px;
    }
    .modes-section-hdr:first-child { margin-top: 4px; }
    .modes-section-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
    .modes-section-hr    { flex: 1; height: 1px; background: var(--border); }
    .modes-section-badge { font-size: 0.75rem; color: var(--muted); }

    /* ── Dialogue read card ───────────────────────── */
    .dial-read-card {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg);
      padding: 36px 24px; text-align: center; min-height: 220px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      cursor: pointer; user-select: none;
    }
    .dial-speaker  { font-size: 0.72rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.08em; }
    .dial-zh-large { font-size: 1.8rem; font-weight: 700; line-height: 1.3; }
    .dial-text     { font-size: 2rem; font-weight: 800; color: var(--primary); line-height: 1.3; }
    .dial-phonetic { font-size: 0.9rem; color: var(--muted); }
    .dial-meta     { font-size: 0.78rem; color: var(--muted); text-align: center; margin-bottom: 10px; }

    /* ── Tile ordering (shared for dial-order, pat-order) ── */
    .order-placed {
      min-height: 60px; background: var(--bg); border: 2px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px; margin-bottom: 12px;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start;
      transition: border-color 0.15s;
    }
    .order-placed:has(.order-tile) { border-color: var(--primary); }
    .order-available { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 14px; }
    .order-tile {
      background: var(--surface); border: 2px solid var(--border); border-radius: 8px;
      padding: 8px 14px; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      user-select: none; text-align: left; line-height: 1.5;
    }
    .order-tile:hover  { border-color: var(--primary); background: var(--primary-lt); }
    .order-tile:active { transform: scale(0.96); }

    /* ── Cloze display ────────────────────────────── */
    .cloze-card {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 22px 20px; margin-bottom: 18px; text-align: center;
    }
    .cloze-speaker { font-size: 0.72rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .cloze-text    { font-size: 1.5rem; font-weight: 700; line-height: 1.5; margin-bottom: 6px; }
    .cloze-blank   { display: inline-block; min-width: 64px; border-bottom: 3px solid var(--primary); margin: 0 4px; }
    .cloze-zh      { font-size: 0.85rem; color: var(--muted); }

    /* ── Pattern fill display ─────────────────────── */
    .pat-frame-card {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 20px; margin-bottom: 18px; text-align: center;
    }
    .pat-frame-text { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
    .pat-frame-expl { font-size: 0.82rem; color: var(--muted); }
    .pat-sentence   { font-size: 1.3rem; font-weight: 700; margin-top: 12px; line-height: 1.5; }
    .pat-blank      { display: inline-block; min-width: 70px; border-bottom: 3px solid var(--primary); margin: 0 3px; }
  </style>
</head>
<body>

  <!-- ── Page: Levels ──────────────────────────────────────────────── -->
  <div class="page active" id="pg-levels">
    <div class="topbar">
      <button class="topbar-back" onclick="location.href='index.html'">←</button>
      <span class="topbar-title" id="levels-lang-title"></span>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="tts-btn" onclick="toggleTTS()">🔊 語音</button>
      </div>
    </div>
    <div class="page-content">
      <div class="section-header"><span class="section-title">學習級別</span></div>
      <div class="item-list" id="levels-list"></div>
      <div class="empty-state" id="levels-empty" style="display:none">
        <div class="empty-icon">📚</div>
        <p>還沒有詞彙<br>請先到編輯器新增</p>
      </div>
    </div>
  </div>

  <!-- ── Page: Lessons ─────────────────────────────────────────────── -->
  <div class="page" id="pg-lessons">
    <div class="topbar">
      <button class="topbar-back" onclick="navToLevels()">←</button>
      <span class="topbar-title" id="lessons-level-title"></span>
    </div>
    <div class="page-content">
      <div class="section-header"><span class="section-title">課程</span></div>
      <div class="item-list" id="lessons-list"></div>
      <div class="empty-state" id="lessons-empty" style="display:none">
        <div class="empty-icon">📝</div>
        <p>此級別還沒有課程</p>
      </div>
    </div>
  </div>

  <!-- ── Page: Mode Selector ───────────────────────────────────────── -->
  <div class="page" id="pg-modes">
    <div class="topbar">
      <button class="topbar-back" onclick="navToLessons()">←</button>
      <span class="topbar-title" id="modes-lesson-title"></span>
    </div>
    <div class="page-content">

      <!-- 詞彙 section -->
      <div id="modes-word-section" style="display:none">
        <div class="modes-section-hdr">
          <span class="modes-section-title">詞彙練習</span>
          <div class="modes-section-hr"></div>
          <span class="modes-section-badge" id="modes-word-count"></span>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px">
          <button class="mode-card" onclick="startMode('flashcard')">
            <div class="mode-icon">🃏</div>
            <div><div class="mode-name">單字卡片</div><div class="mode-desc">翻面記憶，評估熟悉程度</div></div>
          </button>
          <button class="mode-card" id="mode-btn-listen" onclick="startMode('listening')">
            <div class="mode-icon">👂</div>
            <div><div class="mode-name">聽力練習</div><div class="mode-desc">聽發音，選出對應詞彙</div></div>
          </button>
          <button class="mode-card" id="mode-btn-quiz" onclick="startMode('quiz')">
            <div class="mode-icon">📝</div>
            <div><div class="mode-name">詞彙測驗</div><div class="mode-desc">看中文，選出正確翻譯</div></div>
          </button>
          <button class="mode-card" onclick="startMode('spelling')">
            <div class="mode-icon">✏️</div>
            <div><div class="mode-name">拼寫練習</div><div class="mode-desc">看中文，輸入或拼出詞彙</div></div>
          </button>
        </div>
        <div id="mcq-min-notice" style="display:none; color:var(--muted); font-size:0.8rem; text-align:center; margin-top:10px; padding:10px; background:var(--bg); border-radius:var(--radius-sm)">
          ⚠️ 聽力和測驗模式需要至少 4 個詞彙
        </div>
      </div>

      <!-- 對話 section -->
      <div id="modes-dial-section" style="display:none">
        <div class="modes-section-hdr">
          <span class="modes-section-title">對話練習</span>
          <div class="modes-section-hr"></div>
          <span class="modes-section-badge" id="modes-dial-count"></span>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px">
          <button class="mode-card" onclick="startDialogueMode('dial-read')">
            <div class="mode-icon">📖</div>
            <div><div class="mode-name">逐行閱讀</div><div class="mode-desc">一行一行翻開，評估記憶</div></div>
          </button>
          <button class="mode-card" id="mode-btn-dial-fill" onclick="startDialogueMode('dial-fill')">
            <div class="mode-icon">👂</div>
            <div><div class="mode-name">聆聽填空</div><div class="mode-desc">聽發音，選出對應翻譯</div></div>
          </button>
          <button class="mode-card" onclick="startDialogueMode('dial-order')">
            <div class="mode-icon">🔀</div>
            <div><div class="mode-name">排序對話</div><div class="mode-desc">將台詞排回正確順序</div></div>
          </button>
          <button class="mode-card" id="mode-btn-dial-cloze" onclick="startDialogueMode('dial-cloze')">
            <div class="mode-icon">✏️</div>
            <div><div class="mode-name">克漏字</div><div class="mode-desc">從選項填入缺少的詞</div></div>
          </button>
        </div>
        <div id="dial-min-notice" style="display:none; color:var(--muted); font-size:0.8rem; text-align:center; margin-top:10px; padding:10px; background:var(--bg); border-radius:var(--radius-sm)">
          ⚠️ 聆聽填空與克漏字需要至少 4 行台詞
        </div>
      </div>

      <!-- 句型 section -->
      <div id="modes-pat-section" style="display:none">
        <div class="modes-section-hdr">
          <span class="modes-section-title">句型練習</span>
          <div class="modes-section-hr"></div>
          <span class="modes-section-badge" id="modes-pat-count"></span>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px">
          <button class="mode-card" onclick="startPatternMode('pat-fc')">
            <div class="mode-icon">🃏</div>
            <div><div class="mode-name">例句閃卡</div><div class="mode-desc">翻面記憶例句，評估熟悉度</div></div>
          </button>
          <button class="mode-card" id="mode-btn-pat-fill" onclick="startPatternMode('pat-fill')">
            <div class="mode-icon">🧩</div>
            <div><div class="mode-name">替換填空</div><div class="mode-desc">看句型框架，選詞填入空格</div></div>
          </button>
          <button class="mode-card" id="mode-btn-pat-zh2f" onclick="startPatternMode('pat-zh2f')">
            <div class="mode-icon">📝</div>
            <div><div class="mode-name">中翻外文</div><div class="mode-desc">看中文，選出正確例句</div></div>
          </button>
          <button class="mode-card" onclick="startPatternMode('pat-order')">
            <div class="mode-icon">🔤</div>
            <div><div class="mode-name">造句排列</div><div class="mode-desc">拼排詞語，組成正確句子</div></div>
          </button>
        </div>
        <div id="pat-min-notice" style="display:none; color:var(--muted); font-size:0.8rem; text-align:center; margin-top:10px; padding:10px; background:var(--bg); border-radius:var(--radius-sm)">
          ⚠️ 替換填空需要至少 2 個詞槽，中翻外文需要至少 4 個例句
        </div>
      </div>

    </div>
  </div>

  <!-- ── Page: Flashcard ───────────────────────────────────────────── -->
  <div class="page" id="pg-flashcard">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="fc-lesson-title"></span>
      <span class="topbar-badge" id="fc-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="fc-card-label"></span>
        <span id="fc-score-label"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fc-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="page-content">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="fc-hint"     id="fc-hint">點擊看答案</div>
        <div class="fc-zh"       id="fc-zh"></div>
        <div class="fc-word"     id="fc-word"     style="display:none"></div>
        <div class="fc-phonetic" id="fc-phonetic" style="display:none"></div>
        <div class="fc-notes"    id="fc-notes"    style="display:none"></div>
        <button class="tts-round" id="fc-tts"     style="display:none"
                onclick="event.stopPropagation(); playTTS()">🔊</button>
        <img class="fc-image" id="fc-image" style="display:none" alt="">
      </div>
      <div class="answer-row" id="fc-answer-row" style="display:none">
        <button class="btn btn-wrong"   onclick="fcMark(false)">✗ 不會</button>
        <button class="btn btn-correct" onclick="fcMark(true)">✓ 會了</button>
      </div>
    </div>
  </div>

  <!-- ── Page: MCQ (Listening + Quiz) ─────────────────────────────── -->
  <div class="page" id="pg-mcq">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="mcq-title"></span>
      <span class="topbar-badge" id="mcq-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="mcq-card-label"></span>
        <span id="mcq-score-label"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="mcq-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="page-content">
      <div class="mcq-prompt">
        <!-- Listening prompt -->
        <div id="mcq-listen-area" style="display:none">
          <button class="tts-big-btn" onclick="mcqPlayTTS()" id="mcq-tts-btn">🔊</button>
          <div class="mcq-hint">點擊播放，選出正確詞彙</div>
        </div>
        <!-- Quiz prompt -->
        <div id="mcq-quiz-area" style="display:none">
          <div class="mcq-zh-text" id="mcq-zh-text"></div>
          <div class="mcq-hint">選出正確的翻譯</div>
        </div>
      </div>
      <div class="mcq-choices" id="mcq-choices"></div>
    </div>
  </div>

  <!-- ── Page: Spelling ────────────────────────────────────────────── -->
  <div class="page" id="pg-spell">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="spell-lesson-title"></span>
      <span class="topbar-badge" id="spell-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="spell-card-label"></span>
        <span id="spell-score-label"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="spell-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="page-content">
      <div class="spell-prompt">
        <div class="spell-zh"  id="spell-zh"></div>
        <div class="spell-sub" id="spell-mode-label">請拼出對應的詞彙</div>
      </div>

      <!-- Select mode -->
      <div id="spell-select-area">
        <div class="spell-answer-bar" id="spell-assembled" onclick="spellUndoLast()"></div>
        <div class="spell-tiles" id="spell-tiles"></div>
      </div>

      <!-- Input mode -->
      <div id="spell-input-area" style="display:none">
        <input class="form-input spell-input" id="spell-input" type="text"
               placeholder="輸入詞彙…" autocomplete="off">
      </div>

      <div style="display:flex; gap:10px; margin-top:4px">
        <button class="btn btn-ghost btn-sm" id="spell-toggle-btn" onclick="toggleSpellMode()">輸入模式</button>
        <button class="btn btn-primary" style="flex:1" onclick="checkSpelling()">確認</button>
      </div>
      <div id="spell-feedback" style="display:none" class="spell-feedback"></div>
    </div>
  </div>

  <!-- ── Page: Results ─────────────────────────────────────────────── -->
  <div class="page" id="pg-results">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">←</button>
      <span class="topbar-title">學習結果</span>
    </div>
    <div class="page-content">
      <div style="text-align:center; padding:28px 0 12px">
        <div style="font-size:3.2rem; margin-bottom:10px" id="res-emoji"></div>
        <div style="font-size:1.3rem; font-weight:700"   id="res-title"></div>
        <div style="color:var(--muted); font-size:0.88rem; margin-top:6px" id="res-sub"></div>
      </div>
      <div class="results-row">
        <div class="results-stat ok"><div class="big" id="res-correct">0</div><div class="lbl">答對</div></div>
        <div class="results-stat bad"><div class="big" id="res-wrong">0</div><div class="lbl">答錯</div></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:12px; margin-top:8px">
        <button class="btn btn-primary btn-lg" onclick="restartMode()">再練一次</button>
        <button class="btn btn-ghost   btn-lg" onclick="navToModes()">換其他模式</button>
        <button class="btn btn-ghost   btn-lg" onclick="navToLessons()">返回課程</button>
      </div>
    </div>
  </div>

  <!-- ── Page: Dialogue Read ──────────────────────────────────────── -->
  <div class="page" id="pg-dial-read">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="dr-lesson-title"></span>
      <span class="topbar-badge" id="dr-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="dr-card-label"></span>
        <span id="dr-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="dr-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="dial-meta" id="dr-meta"></div>
      <div class="dial-read-card" id="dr-card" onclick="dialReadFlip()">
        <div class="fc-hint"   id="dr-hint">點擊看台詞</div>
        <div class="dial-zh-large" id="dr-zh"></div>
        <div class="dial-speaker"  id="dr-speaker"  style="display:none"></div>
        <div class="dial-text"     id="dr-text"     style="display:none"></div>
        <div class="dial-phonetic" id="dr-phonetic" style="display:none"></div>
        <button class="tts-round"  id="dr-tts"      style="display:none"
                onclick="event.stopPropagation(); drPlayTTS()">🔊</button>
      </div>
      <div class="answer-row" id="dr-answer-row" style="display:none">
        <button class="btn btn-wrong"   onclick="dialReadMark(false)">✗ 沒記住</button>
        <button class="btn btn-correct" onclick="dialReadMark(true)">✓ 記住了</button>
      </div>
    </div>
  </div>

  <!-- ── Page: Dialogue Fill (Listening) ──────────────────────────── -->
  <div class="page" id="pg-dial-fill">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="df-lesson-title"></span>
      <span class="topbar-badge" id="df-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="df-card-label"></span>
        <span id="df-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="df-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="mcq-prompt">
        <button class="tts-big-btn" onclick="dfPlayTTS()">🔊</button>
        <div class="mcq-hint">點擊播放，選出對應的中文翻譯</div>
      </div>
      <div class="mcq-choices" id="df-choices"></div>
    </div>
  </div>

  <!-- ── Page: Dialogue Order ──────────────────────────────────────── -->
  <div class="page" id="pg-dial-order">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="do-lesson-title"></span>
      <span class="topbar-badge" id="do-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="do-card-label"></span>
        <span id="do-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="do-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="dial-meta" id="do-meta"></div>
      <div class="order-placed"    id="do-placed"></div>
      <div class="order-available" id="do-available"></div>
      <div style="display:flex; gap:10px; margin-top:4px">
        <button class="btn btn-ghost btn-sm" onclick="doUndo()">撤銷</button>
        <button class="btn btn-primary" style="flex:1" onclick="doConfirm()">確認順序</button>
      </div>
      <div id="do-feedback" style="display:none" class="spell-feedback"></div>
    </div>
  </div>

  <!-- ── Page: Dialogue Cloze ──────────────────────────────────────── -->
  <div class="page" id="pg-dial-cloze">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="dc-lesson-title"></span>
      <span class="topbar-badge" id="dc-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="dc-card-label"></span>
        <span id="dc-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="dc-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="cloze-card" id="dc-card"></div>
      <div class="mcq-choices" id="dc-choices"></div>
    </div>
  </div>

  <!-- ── Page: Pattern Flashcard ───────────────────────────────────── -->
  <div class="page" id="pg-pat-fc">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="pf-lesson-title"></span>
      <span class="topbar-badge" id="pf-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="pf-card-label"></span>
        <span id="pf-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="pf-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="flashcard" id="pf-card" onclick="patFcFlip()">
        <div class="fc-hint"     id="pf-hint">點擊看例句</div>
        <div class="fc-zh"       id="pf-zh"></div>
        <div class="fc-word"     id="pf-text"     style="display:none"></div>
        <div class="fc-phonetic" id="pf-pattern"  style="display:none"></div>
        <button class="tts-round" id="pf-tts"     style="display:none"
                onclick="event.stopPropagation(); pfPlayTTS()">🔊</button>
      </div>
      <div class="answer-row" id="pf-answer-row" style="display:none">
        <button class="btn btn-wrong"   onclick="patFcMark(false)">✗ 不會</button>
        <button class="btn btn-correct" onclick="patFcMark(true)">✓ 會了</button>
      </div>
    </div>
  </div>

  <!-- ── Page: Pattern Fill ────────────────────────────────────────── -->
  <div class="page" id="pg-pat-fill">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="pfill-lesson-title"></span>
      <span class="topbar-badge" id="pfill-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="pfill-card-label"></span>
        <span id="pfill-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="pfill-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="pat-frame-card" id="pfill-frame"></div>
      <div class="mcq-choices" id="pfill-choices"></div>
    </div>
  </div>

  <!-- ── Page: Pattern Chinese to Foreign ─────────────────────────── -->
  <div class="page" id="pg-pat-zh2f">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="pz-lesson-title"></span>
      <span class="topbar-badge" id="pz-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="pz-card-label"></span>
        <span id="pz-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="pz-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="mcq-prompt">
        <div class="mcq-zh-text" id="pz-zh"></div>
        <div class="mcq-hint">選出正確的外文例句</div>
      </div>
      <div class="mcq-choices" id="pz-choices"></div>
    </div>
  </div>

  <!-- ── Page: Pattern Word Order ──────────────────────────────────── -->
  <div class="page" id="pg-pat-order">
    <div class="topbar">
      <button class="topbar-back" onclick="exitMode()">✕</button>
      <span class="topbar-title" id="po-lesson-title"></span>
      <span class="topbar-badge" id="po-badge"></span>
    </div>
    <div class="study-hdr">
      <div class="study-hdr-meta">
        <span id="po-card-label"></span>
        <span id="po-score-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="po-fill" style="width:0%"></div></div>
    </div>
    <div class="page-content">
      <div class="spell-prompt">
        <div class="spell-zh"  id="po-zh"></div>
        <div class="spell-sub">請排出正確的句子順序</div>
      </div>
      <div class="order-placed"    id="po-placed"></div>
      <div class="order-available" id="po-available"></div>
      <div style="display:flex; gap:10px; margin-top:4px">
        <button class="btn btn-ghost btn-sm" onclick="poUndo()">撤銷</button>
        <button class="btn btn-primary" style="flex:1" onclick="poConfirm()">確認</button>
      </div>
      <div id="po-feedback" style="display:none" class="spell-feedback"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
